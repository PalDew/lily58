# --------------------
# USB keyboard support
# --------------------
CONFIG_USB=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_HID=y
CONFIG_USB_DEVICE_STACK=y

# --------------------
# Bluetooth keyboard
# --------------------
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PERIPHERAL=y

# --------------------
# Split keyboard
# --------------------
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_KEYBOARD_NAME="Lily58"

